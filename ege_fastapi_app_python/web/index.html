<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренажёр ЕГЭ 2026</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🎓 Тренажёр ЕГЭ по профильной математике 2026</h1>
    <div id="auth">
        <input type="text" id="username" placeholder="Ваше имя">
        <button onclick="register()">Зарегистрироваться</button>
        <p id="userInfo"></p>
    </div>
    <div id="actions" style="display:none;">
        <button onclick="startVariant()">Начать вариант</button>
        <button onclick="startTimeAttack()">Time Attack (12 заданий, 10 минут)</button>
        <button onclick="listCompetitions()">Соревнования</button>
        <button onclick="showStats()">Моя статистика</button>
    </div>
    <div id="taskArea" style="display:none;"></div>
    <div id="resultArea"></div>
    <script src="/static/app.js"></script>
</body>
</html>
