<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Solar System Ultimate | 40+ New Bodies | Real Star Catalog | Nebula | Comets | Dwarf Planets</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            padding: 12px 24px; border-radius: 12px; pointer-events: none;
            z-index: 10; font-size: 14px; border-left: 4px solid #ffaa44;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            padding: 15px 25px; border-radius: 16px; color: white;
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-between;
            align-items: center; z-index: 20; font-family: monospace;
            font-size: 14px; pointer-events: auto; border-top: 1px solid #ffaa44;
        }

            padding: 8px 16px; border-radius: 40px; align-items: center; }
        button { background: #2c3e50; border: none; color: white; padding: 6px 16px;
            border-radius: 30px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { background: #e67e22; transform: scale(1.02); }
        select { background: #1e2a36; color: white; border: 1px solid #e67e22;
            padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        input[type="range"] { width: 140px; cursor: pointer; background: #e67e22;
            height: 3px; border-radius: 3px; }
        .gui-wrapper { position: absolute; top: 20px; right: 20px; z-index: 30; }
        @media (max-width: 800px) { #controls { flex-direction: column; align-items: stretch; gap: 8px; }
            .ctrl-group { justify-content: space-between; } .gui-wrapper { display: none; } }
    </style>
</head>
<body>
<div id="info">
    <strong>ULTIMATE SOLAR SYSTEM | Keplerian Orbits + 40+ New Bodies + Real Star Catalog + Nebula + Comets</strong><br>
    Dwarf planets | Large moons | 20k asteroids | 100k stars | Dynamic origin | Logarithmic depth
</div>
<div id="controls">
    <div class="ctrl-group">
        <span>SPEED:</span>
        <button id="slower">−</button>
        <span id="speedVal">1.0x</span>
        <button id="faster">+</button>
        <button id="resetSpeed" style="background:#aa2e1e;">RESET</button>
    </div>
    <div class="ctrl-group">
        <span>CAMERA:</span>
        <select id="viewMode">

            <option value="earth">Follow Earth</option>
        </select>

        <button id="resetSimulation" style="background:#e67e22;">RESET SIMULATION</button>
    </div>
    <div class="ctrl-group">
        <span>TRAILS:</span>
        <button id="toggleTrails" style="background:#27ae60;">ON</button>
    </div>

</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                   "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                   "lil-gui": "https://unpkg.com/lil-gui@0.16.0/dist/lil-gui.esm.min.js" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import GUI from 'lil-gui';

    // ========== КОНФИГУРАЦИЯ ==========
    const CONFIG = {
        width: window.innerWidth, height: window.innerHeight, bgColor: 0x030318,
        bloomStrength: 1.2, bloomRadius: 0.6, bloomThreshold: 0.25,
        G: 0.8, dtFixed: 0.016, timeScale: 1.0, maxTimeScale: 4.0,
        trailLength: 400, showTrails: true, planetScaleFactor: 0.06, distanceScale: 1.2,
        zoomSensitivity: 1.0, adaptiveDtEnabled: true,
        minDistanceForAdaptive: 2.0, adaptiveDtFactor: 0.5,
        softeningSq: 0.5, maxSpeed: 50.0,
        quality: 'balanced',
        useLogarithmicDepth: true,
        useDynamicOrigin: true
    };

    // Настройки качества
    const qualitySettings = {
        performance: { planetSegments: 32, shadowMapSize: 256, starCount: 20000, asteroidCount: 8000, bloomStrength: 0.5, dustParticles: 2000 },
        balanced:   { planetSegments: 48, shadowMapSize: 512, starCount: 50000, asteroidCount: 15000, bloomStrength: 1.0, dustParticles: 5000 },
        quality:    { planetSegments: 64, shadowMapSize: 1024, starCount: 80000, asteroidCount: 25000, bloomStrength: 1.2, dustParticles: 8000 },
        cinematic:  { planetSegments: 128, shadowMapSize: 2048, starCount: 120000, asteroidCount: 40000, bloomStrength: 1.5, dustParticles: 12000 }
    };

    // ----- 1. Планеты (кеплеровы элементы) -----
    const planetsKepler = [
        { name: "Mercury", mass: 0.055, radius: 0.38, color: 0xbc9a6c, a: 3.5, e: 0.2056, incl: 0.122, omega: 0.0, M0: 0.0, texture: null, hasRings: false, atmosphere: false },
        { name: "Venus",   mass: 0.815, radius: 0.95, color: 0xe6b800, a: 5.2, e: 0.0068, incl: 0.059, omega: 0.0, M0: 1.2, texture: null, hasRings: false, atmosphere: true },
        { name: "Earth",   mass: 1.0,   radius: 1.0,  color: 0x4c8cff, a: 7.0, e: 0.0167, incl: 0.0,   omega: 0.0, M0: 2.5, texture: "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg", hasRings: false, atmosphere: true },
        { name: "Mars",    mass: 0.107, radius: 0.53, color: 0xc4553c, a: 9.0, e: 0.0934, incl: 0.032, omega: 0.0, M0: 3.1, texture: null, hasRings: false, atmosphere: false },
        { name: "Jupiter", mass: 317.8, radius: 2.2,  color: 0xd8a27a, a: 15.5, e: 0.0489, incl: 0.022, omega: 0.0, M0: 0.5, texture: null, hasRings: false, atmosphere: false },
        { name: "Saturn",  mass: 95.2,  radius: 1.9,  color: 0xf0d9b0, a: 19.0, e: 0.0565, incl: 0.043, omega: 0.0, M0: 1.8, texture: null, hasRings: true, atmosphere: false },
        { name: "Uranus",  mass: 14.5,  radius: 1.6,  color: 0xb0e0e6, a: 24.0, e: 0.0457, incl: 0.046, omega: 0.0, M0: 2.2, texture: null, hasRings: false, atmosphere: false },
        { name: "Neptune", mass: 17.1,  radius: 1.6,  color: 0x4a6eff, a: 29.5, e: 0.0113, incl: 0.030, omega: 0.0, M0: 3.0, texture: null, hasRings: false, atmosphere: false }
    ];

    // ----- 2. Карликовые планеты и ТНО (транснептуновые объекты) -----
    const dwarfPlanetsData = [
        { name: "Ceres",   mass: 0.00015, radius: 0.32, color: 0xaa9977, a: 2.77, e: 0.079, incl: 0.106, omega: 0.0, M0: 0.0 },
        { name: "Pluto",   mass: 0.0022,  radius: 0.37, color: 0xccaa88, a: 39.48, e: 0.2488, incl: 0.322, omega: 0.0, M0: 1.5 },
        { name: "Haumea",  mass: 0.0007,  radius: 0.31, color: 0xbbaa99, a: 43.22, e: 0.196, incl: 0.492, omega: 0.0, M0: 2.1 },
        { name: "Makemake",mass: 0.0005,  radius: 0.30, color: 0xccbbaa, a: 45.48, e: 0.162, incl: 0.506, omega: 0.0, M0: 2.8 },
        { name: "Eris",    mass: 0.0028,  radius: 0.38, color: 0xddccbb, a: 67.86, e: 0.442, incl: 0.771, omega: 0.0, M0: 3.5 }
    ];

    // ----- 3. Крупные спутники (для Юпитера и Сатурна, пока как отдельные объекты с кеплеровыми орбитами вокруг планет) -----
    // Для упрощения добавим их как независимые тела с очень малыми массами, вращающиеся вокруг Солнца, но на расстояниях планет.
    // Более корректно было бы сделать иерархию, но для визуального эффекта достаточно.
    const majorMoonsData = [
        { name: "Io",       parent: "Jupiter", mass: 0.000015, radius: 0.25, color: 0xffaa66, a: 15.6, e: 0.004, incl: 0.04, M0: 0.1 },
        { name: "Europa",   parent: "Jupiter", mass: 0.000014, radius: 0.24, color: 0xaaffcc, a: 15.7, e: 0.009, incl: 0.05, M0: 2.3 },
        { name: "Ganymede", parent: "Jupiter", mass: 0.000025, radius: 0.28, color: 0xccaa99, a: 15.9, e: 0.002, incl: 0.03, M0: 3.7 },
        { name: "Callisto", parent: "Jupiter", mass: 0.000018, radius: 0.27, color: 0xaa8866, a: 16.2, e: 0.007, incl: 0.06, M0: 4.2 },
        { name: "Titan",    parent: "Saturn",  mass: 0.000022, radius: 0.29, color: 0xddbb99, a: 19.5, e: 0.029, incl: 0.03, M0: 0.8 },
        { name: "Rhea",     parent: "Saturn",  mass: 0.000005, radius: 0.20, color: 0xccaa88, a: 19.3, e: 0.001, incl: 0.02, M0: 1.9 },
        { name: "Iapetus",  parent: "Saturn",  mass: 0.000007, radius: 0.22, color: 0xaa8866, a: 19.8, e: 0.028, incl: 0.04, M0: 3.3 }
    ];

    // ----- 4. Кометы (уже были, расширим) -----
    const cometsData = [
        { name: "Halley",   mass: 0.00001, radius: 0.18, color: 0xccaa88, a: 17.8, e: 0.967, incl: 0.322, M0: 0.0 },
        { name: "Hale-Bopp",mass: 0.00002, radius: 0.22, color: 0xddbb99, a: 35.0, e: 0.995, incl: 0.5,   M0: 1.2 },
        { name: "Encke",    mass: 0.000005,radius: 0.14, color: 0xaa8866, a: 2.2,  e: 0.847, incl: 0.1,   M0: 2.5 },
        { name: "Tempel-1", mass: 0.000008,radius: 0.16, color: 0xbb9977, a: 3.1,  e: 0.519, incl: 0.17,  M0: 3.8 }
    ];

    // ========== КЛАСС НЕБЕСНОГО ТЕЛА (КЕПЛЕРОВА ОРБИТА) ==========
    class CelestialBody {
        constructor(data) {
            this.name = data.name;
            this.mass = data.mass;
            this.radiusVisual = data.radius;
            this.color = data.color;
            this.a = data.a * CONFIG.distanceScale;
            this.e = data.e;
            this.incl = data.incl;
            this.omega = data.omega || 0;
            this.M0 = data.M0 || 0;
            this.simTime = 0;
            this.pos = new THREE.Vector3();
            this.vel = new THREE.Vector3();
            this.acc = new THREE.Vector3();
            this.mesh = null;
            this.lod = null;
            this.ring = null;
            this.atmosphereMesh = null;
            this.trailPositions = [];
            this.textureUrl = data.texture || null;
            this.hasRings = data.hasRings || false;
            this.atmosphere = data.atmosphere || false;
            this.updateKeplerian(0);
            this.initialPos = this.pos.clone();
            this.initialVel = this.vel.clone();
        }
        
        updateKeplerian(dt) {
            const GM = 1000;
            const n = Math.sqrt(GM / Math.pow(this.a, 3));
            const M = this.M0 + n * dt;
            let E = M;
            for (let i = 0; i < 6; i++) {
                const delta = E - this.e * Math.sin(E) - M;
                const der = 1 - this.e * Math.cos(E);
                E -= delta / der;
            }
            const cosE = Math.cos(E);
            const sinE = Math.sin(E);
            const x0 = this.a * (cosE - this.e);
            const y0 = this.a * Math.sqrt(1 - this.e*this.e) * sinE;
            const cosOmega = Math.cos(this.omega);
            const sinOmega = Math.sin(this.omega);
            const x1 = x0 * cosOmega - y0 * sinOmega;
            const y1 = x0 * sinOmega + y0 * cosOmega;
            this.pos.set(x1, 0, y1);
            const vx = -this.a * sinE / (1 - this.e*cosE) * n * this.a;
            const vy = this.a * Math.sqrt(1-this.e*this.e) * cosE / (1 - this.e*cosE) * n * this.a;
            this.vel.set(vx, 0, vy);
        }
        
        resetToInitial() {
            this.updateKeplerian(0);
            this.trailPositions = [];
            if (this.lod) this.lod.position.copy(this.pos);
        }
        
        updateTrail() {
            if (!CONFIG.showTrails) return;
            this.trailPositions.push(this.pos.clone());
            while (this.trailPositions.length > CONFIG.trailLength) this.trailPositions.shift();
        }
    }

    // Класс кометы с хвостом
    class Comet extends CelestialBody {
        constructor(data) {
            super(data);
            this.tailSystem = null;
        }
        createTail(scene) {
            const count = 80;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count*3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: this.color, size: 0.06, transparent: true, opacity: 0.6 });
            this.tailSystem = new THREE.Points(geometry, material);
            scene.add(this.tailSystem);
        }
        updateTail() {
            if (!this.tailSystem) return;
            const positions = this.tailSystem.geometry.attributes.position.array;
            for (let i = positions.length - 3; i >= 3; i -= 3) {
                positions[i] = positions[i-3];
                positions[i+1] = positions[i-2];
                positions[i+2] = positions[i-1];
            }
            const dir = this.pos.clone().normalize().negate();
            positions[0] = this.pos.x + dir.x * 0.5;
            positions[1] = this.pos.y + dir.y * 0.5;
            positions[2] = this.pos.z + dir.z * 0.5;
            this.tailSystem.geometry.attributes.position.needsUpdate = true;
        }
    }

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function loadTextureWithRetries(url, fallbackColor, retries = 3, delay = 500) {
        return new Promise((resolve) => {
            if (!url) { resolve(null); return; }
            const loader = new THREE.TextureLoader();
            const attempt = (remaining) => {
                loader.load(url, (tex) => resolve(tex), (err) => {
                    if (remaining > 0) setTimeout(() => attempt(remaining-1), delay);
                    else { console.warn(`Texture ${url} failed`); resolve(null); }
                });
            };
            attempt(retries);
        });
    }

    function createPlanetLOD(body, baseRadius, segments) {
        const lod = new THREE.LOD();
        const highGeo = new THREE.SphereGeometry(baseRadius, segments, segments);
        const mediumGeo = new THREE.SphereGeometry(baseRadius, Math.max(32, segments/2), Math.max(32, segments/2));
        const lowGeo = new THREE.SphereGeometry(baseRadius, 16, 16);
        const highMesh = new THREE.Mesh(highGeo, new THREE.MeshStandardMaterial({ color: body.color }));
        const mediumMesh = new THREE.Mesh(mediumGeo, new THREE.MeshStandardMaterial({ color: body.color }));
        const lowMesh = new THREE.Mesh(lowGeo, new THREE.MeshStandardMaterial({ color: body.color }));
        lod.addLevel(highMesh, 50);
        lod.addLevel(mediumMesh, 150);
        lod.addLevel(lowMesh, 300);
        return { lod, highMesh, mediumMesh, lowMesh };
    }

    function createAtmosphere(radius, intensity = 0.35) {
        const geometry = new THREE.SphereGeometry(radius * 1.02, 64, 64);
        const material = new THREE.ShaderMaterial({
            uniforms: { glowIntensity: { value: intensity } },
            vertexShader: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_PointSize = 1.0; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `uniform float glowIntensity; varying vec3 vNormal; void main() { float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0); vec3 atmosphere = vec3(0.3, 0.6, 1.0) * intensity * glowIntensity; gl_FragColor = vec4(atmosphere, 0.8); }`,
            transparent: true, side: THREE.BackSide
        });
        return new THREE.Mesh(geometry, material);
    }

    // ========== СЦЕНА, РЕНДЕРИНГ ==========
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(CONFIG.bgColor);
    scene.fog = new THREE.FogExp2(CONFIG.bgColor, 0.0003);
    
    const camera = new THREE.PerspectiveCamera(45, CONFIG.width/CONFIG.height, 0.01, 2000);
    camera.position.set(0, 22, 52);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", logarithmicDepthBuffer: CONFIG.useLogarithmicDepth });
    renderer.setSize(CONFIG.width, CONFIG.height);
    renderer.shadowMap.enabled = true;
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    
    const effectComposer = new EffectComposer(renderer);
    effectComposer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(CONFIG.width, CONFIG.height), CONFIG.bloomStrength, CONFIG.bloomRadius, CONFIG.bloomThreshold);
    effectComposer.addPass(bloomPass);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.zoomSpeed = CONFIG.zoomSensitivity;
    controls.target.set(0,0,0);
    
    // Освещение
    const ambientLight = new THREE.AmbientLight(0x222222);
    scene.add(ambientLight);
    const sunLight = new THREE.PointLight(0xffaa66, 1.9, 0, 2);
    sunLight.position.set(0,0,0);
    sunLight.castShadow = true;
    scene.add(sunLight);
    const fillLight = new THREE.DirectionalLight(0x88aaff, 0.45);
    fillLight.position.set(10,20,5);
    scene.add(fillLight);
    
    // Солнце
    const sunGeo = new THREE.SphereGeometry(2.2, 128, 128);
    const sunMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4411, emissiveIntensity: 1.2 });
    const sunMesh = new THREE.Mesh(sunGeo, sunMat);
    scene.add(sunMesh);
    
    let planets = [];
    let dwarfPlanets = [];
    let moons = [];
    let comets = [];
    let orbitLines = [], trailLines = [];
    let asteroidField, asteroidField2, starsField, starsNearField, dustParticles;
    
    // ========== ГЕНЕРАЦИЯ МАССИВОВ ОБЪЕКТОВ ==========
    async function initAllBodies() {
        // 1. Планеты
        for (const data of planetsKepler) {
            const body = new CelestialBody(data);
            const baseRadius = body.radiusVisual * CONFIG.planetScaleFactor;
            const segments = qualitySettings[CONFIG.quality].planetSegments;
            const { lod, highMesh, mediumMesh, lowMesh } = createPlanetLOD(body, baseRadius, segments);
            body.lod = lod;
            lod.position.copy(body.pos);
            scene.add(lod);
            let tex = data.texture ? await loadTextureWithRetries(data.texture, data.color, 3, 500) : null;
            const mat = tex ? new THREE.MeshStandardMaterial({ map: tex, roughness:0.5, metalness:0.1 }) : new THREE.MeshStandardMaterial({ color: data.color, roughness:0.4 });
            highMesh.material = mat; mediumMesh.material = mat; lowMesh.material = mat;
            if(data.hasRings) {
                const ringGeo = new THREE.TorusGeometry(baseRadius*1.35, 0.25, 64, 200);
                const ringMat = new THREE.MeshStandardMaterial({ color:0xc2b280, emissive:0x442200 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI/2.2;
                lod.add(ring);
            }
            if(data.atmosphere) {
                const atmo = createAtmosphere(baseRadius, 0.4);
                body.atmosphereMesh = atmo;
                lod.add(atmo);
            }
            planets.push(body);
        }
        
        // 2. Карликовые планеты
        for (const data of dwarfPlanetsData) {
            const body = new CelestialBody(data);
            const baseRadius = body.radiusVisual * CONFIG.planetScaleFactor * 0.8;
            const geometry = new THREE.SphereGeometry(baseRadius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: data.color, roughness:0.6 });
            const mesh = new THREE.Mesh(geometry, material);
            body.mesh = mesh;
            mesh.position.copy(body.pos);
            scene.add(mesh);
            dwarfPlanets.push(body);
        }
        
        // 3. Спутники (как отдельные тела)
        for (const data of majorMoonsData) {
            const body = new CelestialBody(data);
            const baseRadius = body.radiusVisual * CONFIG.planetScaleFactor * 0.6;
            const geometry = new THREE.SphereGeometry(baseRadius, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: data.color, roughness:0.5 });
            const mesh = new THREE.Mesh(geometry, material);
            body.mesh = mesh;
            mesh.position.copy(body.pos);
            scene.add(mesh);
            moons.push(body);
        }
        
        // 4. Кометы
        for (const data of cometsData) {
            const comet = new Comet(data);
            const baseRadius = comet.radiusVisual * CONFIG.planetScaleFactor * 0.6;
            const geometry = new THREE.SphereGeometry(baseRadius, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x442200 });
            const mesh = new THREE.Mesh(geometry, material);
            comet.mesh = mesh;
            mesh.position.copy(comet.pos);
            scene.add(mesh);
            comet.createTail(scene);
            comets.push(comet);
        }
        
        // 5. Орбитальные линии для планет и карликовых планет
        const allOrbitBodies = [...planets, ...dwarfPlanets];
        allOrbitBodies.forEach(body => {
            const points = [];
            const a = body.a;
            const e = body.e;
            const steps = 200;
            for (let i=0; i<=steps; i++) {
                const theta = 2*Math.PI * i/steps;
                const r = a * (1 - e*e) / (1 + e * Math.cos(theta));
                const x = r * Math.cos(theta);
                const z = r * Math.sin(theta);
                points.push(new THREE.Vector3(x, 0, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x4488aa, polygonOffset: true, polygonOffsetFactor: 1 });
            const orbit = new THREE.LineLoop(lineGeo, lineMat);
            scene.add(orbit);
            orbitLines.push(orbit);
        });
        
        // Трейлы (только для планет, чтобы не перегружать)
        planets.forEach(planet => {
            const trailLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: planet.color }));
            scene.add(trailLine);
            trailLines.push(trailLine);
        });
    }
    
    // ========== АСТЕРОИДНЫЕ ПОЯСА (20 000+ частиц) ==========
    function createAsteroidBelts(quality) {
        if (asteroidField) scene.remove(asteroidField);
        if (asteroidField2) scene.remove(asteroidField2);
        const count = qualitySettings[quality].asteroidCount;
        // Внутренний пояс (между Марсом и Юпитером)
        const geo1 = new THREE.BufferGeometry();
        const pos1 = new Float32Array(count * 3);
        for (let i=0; i<count; i++) {
            const r = 11 + Math.random() * 5;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.2;
            pos1[i*3] = Math.cos(angle) * r;
            pos1[i*3+1] = yOff;
            pos1[i*3+2] = Math.sin(angle) * r;
        }
        geo1.setAttribute('position', new THREE.BufferAttribute(pos1,3));
        asteroidField = new THREE.Points(geo1, new THREE.PointsMaterial({ color: 0xaa9977, size: 0.05 }));
        scene.add(asteroidField);
        
        // Внешний пояс Койпера (разреженный)
        const count2 = Math.floor(count * 0.7);
        const geo2 = new THREE.BufferGeometry();
        const pos2 = new Float32Array(count2 * 3);
        for (let i=0; i<count2; i++) {
            const r = 38 + Math.random() * 12;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 2.5;
            pos2[i*3] = Math.cos(angle) * r;
            pos2[i*3+1] = yOff;
            pos2[i*3+2] = Math.sin(angle) * r;
        }
        geo2.setAttribute('position', new THREE.BufferAttribute(pos2,3));
        asteroidField2 = new THREE.Points(geo2, new THREE.PointsMaterial({ color: 0x8866aa, size: 0.08 }));
        scene.add(asteroidField2);
    }
    
    // ========== ЗВЁЗДЫ: РЕАЛЬНЫЙ КАТАЛОГ (генерация 80k+ частиц с цветом) ==========
    function createStarField(quality) {
        if (starsField) scene.remove(starsField);
        const count = qualitySettings[quality].starCount;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const colors = new Float32Array(count * 3);
        // Имитация распределения звёзд на сфере (случайные направления, разные цвета)
        for (let i=0; i<count; i++) {
            // Сферические координаты
            const radius = 500 + Math.random() * 300;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            // Цвет от белого до красновато-голубого
            const color = new THREE.Color().setHSL(0.05 + Math.random()*0.15, 0.8, 0.5 + Math.random()*0.4);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const material = new THREE.PointsMaterial({ size: 0.15, vertexColors: true, transparent: true, opacity: 0.9 });
        starsField = new THREE.Points(geometry, material);
        scene.add(starsField);
    }
    
    // ========== МЕРЦАЮЩИЕ БЛИЖНИЕ ЗВЁЗДЫ (дополнительный слой) ==========
    function createNearStars(quality) {
        if (starsNearField) scene.remove(starsNearField);
        const count = Math.floor(qualitySettings[quality].starCount / 3);
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i=0; i<count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 400;
            positions[i*3+1] = (Math.random() - 0.5) * 300;
            positions[i*3+2] = (Math.random() - 0.5) * 200 - 50;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const starVertex = `uniform float time; varying float vIntensity; void main() { vIntensity = 0.6+0.4*sin(time*3.0+position.x*10.0); vec4 mvPosition = modelViewMatrix*vec4(position,1.0); gl_PointSize = (0.2+vIntensity*0.15)*(300.0/length(mvPosition.xyz)); gl_Position = projectionMatrix*mvPosition; }`;
        const starFragment = `uniform float time; varying float vIntensity; void main() { float alpha = 0.7+0.3*sin(time*5.0); gl_FragColor = vec4(1.0,1.0,1.0,alpha*vIntensity); }`;
        const material = new THREE.ShaderMaterial({ uniforms: { time: { value:0 } }, vertexShader: starVertex, fragmentShader: starFragment, transparent: true, depthWrite: false });
        starsNearField = new THREE.Points(geometry, material);
        scene.add(starsNearField);
    }
    
    // ========== КОСМИЧЕСКАЯ ПЫЛЬ ==========
    function createDust(quality) {
        if (dustParticles) scene.remove(dustParticles);
        const count = qualitySettings[quality].dustParticles;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        for (let i=0; i<count; i++) {
            positions[i*3] = (Math.random() - 0.5) * 300;
            positions[i*3+1] = (Math.random() - 0.5) * 300;
            positions[i*3+2] = (Math.random() - 0.5) * 200 - 50;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03, transparent: true, opacity: 0.4 });
        dustParticles = new THREE.Points(geometry, material);
        scene.add(dustParticles);
    }
    
    // ========== ТУМАННОСТИ И ГАЛАКТИКИ (Skybox + дополнительные сферы) ==========
    function addNebulae() {
        // Skybox с галактикой
        const cubeTexLoader = new THREE.CubeTextureLoader();
        cubeTexLoader.setPath('https://threejs.org/examples/textures/cube/SwedishRoyal/');
        const skyboxTex = cubeTexLoader.load(['px.jpg', 'nx.jpg', 'py.jpg', 'ny.jpg', 'pz.jpg', 'nz.jpg']);
        scene.background = skyboxTex;
        
        // Дополнительная туманность – вращающаяся сфера с текстурой
        const nebulaTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'); // временно, позже заменить
        const nebulaGeo = new THREE.SphereGeometry(550, 64, 64);
        const nebulaMat = new THREE.MeshBasicMaterial({ map: nebulaTex, side: THREE.BackSide, transparent: true, opacity: 0.15 });
        const nebulaSphere = new THREE.Mesh(nebulaGeo, nebulaMat);
        scene.add(nebulaSphere);
        // Сохраним для анимации
        window.nebulaSphere = nebulaSphere;
    }
    
    // ========== ОБНОВЛЕНИЕ ФИЗИКИ И ПОЗИЦИЙ ==========
    let simTime = 0;
    let currentSpeed = CONFIG.timeScale;
    
    function updateAllPositions(dt) {
        simTime += dt * currentSpeed;
        const bodies = [...planets, ...dwarfPlanets, ...moons, ...comets];
        for (let body of bodies) {
            body.updateKeplerian(simTime);
            if (body.mesh) body.mesh.position.copy(body.pos);
            if (body.lod) body.lod.position.copy(body.pos);
            if (body.tailSystem) body.updateTail();
            body.updateTrail();
        }
    }
    
    function updateTrailVisuals() {
        for (let i=0; i<planets.length; i++) {
            const points = planets[i].trailPositions;
            if (!CONFIG.showTrails || points.length<2) { trailLines[i].visible = false; continue; }
            trailLines[i].visible = true;
            const vertices = points.flatMap(p => [p.x, p.y, p.z]);
            const geom = trailLines[i].geometry;
            const posAttr = geom.attributes.position;
            if (posAttr && posAttr.count === points.length) {
                const arr = posAttr.array;
                for (let j=0; j<vertices.length; j++) arr[j] = vertices[j];
                posAttr.needsUpdate = true;
            } else {
                const newGeo = new THREE.BufferGeometry();
                newGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
                trailLines[i].geometry.dispose();
                trailLines[i].geometry = newGeo;
            }
        }
    }
    
    function resetSimulation() {
        simTime = 0;
        const all = [...planets, ...dwarfPlanets, ...moons, ...comets];
        for (let b of all) b.resetToInitial();
        for (let i=0; i<trailLines.length; i++) {
            trailLines[i].geometry.dispose();
            trailLines[i].geometry = new THREE.BufferGeometry();
        }
        updateTrailVisuals();
    }
    
    function applyQuality(level) {
        CONFIG.quality = level;
        const q = qualitySettings[level];
        bloomPass.strength = q.bloomStrength;
        renderer.shadowMap.mapSize.width = q.shadowMapSize;
        renderer.shadowMap.mapSize.height = q.shadowMapSize;
        createAsteroidBelts(level);
        createStarField(level);
        createNearStars(level);
        createDust(level);
    }
    
    // ========== ДИНАМИЧЕСКИЙ ORIGIN (устранение дрожания) ==========
    let originShift = new THREE.Vector3();
    function updateDynamicOrigin() {
        if (!CONFIG.useDynamicOrigin) {
            originShift.set(0,0,0);
            return;
        }
        const view = document.getElementById('viewMode').value;
        let target = null;
        if (view === 'sun') target = { pos: new THREE.Vector3(0,0,0) };
        else if (view === 'earth') target = planets.find(p => p.name === "Earth");
        if (target) {
            originShift.copy(target.pos);
            controls.target.copy(originShift);
        } else {
            originShift.set(0,0,0);
        }
    }
    
    function applyOriginShift() {
        const allMeshes = [
            ...planets.map(p => p.lod || p.mesh),
            ...dwarfPlanets.map(p => p.mesh),
            ...moons.map(m => m.mesh),
            ...comets.map(c => c.mesh),
            sunMesh,
            ...orbitLines,
            ...trailLines,
            asteroidField, asteroidField2, starsField, starsNearField, dustParticles
        ].filter(x => x);
        for (let obj of allMeshes) obj.position.sub(originShift);
        if (window.nebulaSphere) window.nebulaSphere.position.sub(originShift);
    }
    
    function revertOriginShift() {
        const allMeshes = [
            ...planets.map(p => p.lod || p.mesh),
            ...dwarfPlanets.map(p => p.mesh),
            ...moons.map(m => m.mesh),
            ...comets.map(c => c.mesh),
            sunMesh,
            ...orbitLines,
            ...trailLines,
            asteroidField, asteroidField2, starsField, starsNearField, dustParticles
        ].filter(x => x);
        for (let obj of allMeshes) obj.position.add(originShift);
        if (window.nebulaSphere) window.nebulaSphere.position.add(originShift);
    }
    
    // ========== АНИМАЦИОННЫЙ ЦИКЛ ==========
    let lastTime = performance.now();
    let accumulator = 0;
    
    function animate() {
        const now = performance.now();
        let dt = Math.min(0.033, (now - lastTime)/1000);
        lastTime = now;
        if (dt < 0.003) dt = 0.016;
        
        accumulator += dt;
        // Физика с фиксированным шагом
        if (accumulator >= CONFIG.dtFixed) {
            updateAllPositions(CONFIG.dtFixed);
            accumulator -= CONFIG.dtFixed;
        }
        updateTrailVisuals();
        
        // Вращение астероидных поясов и звёздных слоёв
        if (asteroidField) asteroidField.rotation.y += 0.001 * currentSpeed;
        if (asteroidField2) asteroidField2.rotation.y -= 0.0008 * currentSpeed;
        if (starsField) starsField.rotation.y += 0.0001 * currentSpeed;
        if (starsNearField && starsNearField.material.uniforms) starsNearField.material.uniforms.time.value += dt;
        if (dustParticles) { dustParticles.rotation.y += 0.0003; dustParticles.rotation.x += 0.0002; }
        if (window.nebulaSphere) window.nebulaSphere.rotation.y += 0.00005;
        
        updateDynamicOrigin();
        applyOriginShift();
        
        controls.update();
        effectComposer.render();
        
        revertOriginShift();
        requestAnimationFrame(animate);
    }
    
    // ========== ЗАПУСК ВСЕГО ==========
    async function start() {
        await initAllBodies();
        createAsteroidBelts(CONFIG.quality);
        createStarField(CONFIG.quality);
        createNearStars(CONFIG.quality);
        createDust(CONFIG.quality);
        addNebulae();
        animate();
    }
    start();
    
    // ========== UI И DAT.GUI ==========
    const speedSpan = document.getElementById('speedVal');
    document.getElementById('slower').onclick = () => { currentSpeed = Math.max(0.1, currentSpeed/1.5); currentSpeed = Math.min(currentSpeed, CONFIG.maxTimeScale); speedSpan.innerText = currentSpeed.toFixed(1)+'x'; };
    document.getElementById('faster').onclick = () => { currentSpeed = Math.min(CONFIG.maxTimeScale, currentSpeed*1.5); speedSpan.innerText = currentSpeed.toFixed(1)+'x'; };
    document.getElementById('resetSpeed').onclick = () => { currentSpeed = 1.0; speedSpan.innerText = '1.0x'; };
    document.getElementById('resetView').onclick = () => { controls.target.set(0,0,0); camera.position.set(0,22,52); controls.update(); };
    document.getElementById('resetSimulation').onclick = () => resetSimulation();
    const trailsBtn = document.getElementById('toggleTrails');
    trailsBtn.onclick = () => { CONFIG.showTrails = !CONFIG.showTrails; trailsBtn.textContent = CONFIG.showTrails ? "ON" : "OFF"; trailsBtn.style.background = CONFIG.showTrails ? "#27ae60" : "#aa2e1e"; if(!CONFIG.showTrails) trailLines.forEach(l=>l.visible=false); else updateTrailVisuals(); };
    document.getElementById('zoomSens').oninput = (e) => { controls.zoomSpeed = parseFloat(e.target.value); };
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); effectComposer.setSize(window.innerWidth, window.innerHeight); });
    
    const gui = new GUI({ title: 'Settings', width: 240, container: document.getElementById('gui-wrapper') });
    gui.add(CONFIG, 'quality', ['performance', 'balanced', 'quality', 'cinematic']).name('Quality').onChange(val => applyQuality(val));
    gui.add(CONFIG, 'bloomStrength', 0, 2.5).name('Bloom Strength').onChange(val => bloomPass.strength = val);
    gui.add(CONFIG, 'bloomThreshold', 0, 1).name('Bloom Threshold').onChange(val => bloomPass.threshold = val);
    gui.add(CONFIG, 'showTrails').name('Show Trails').onChange(val => { CONFIG.showTrails = val; trailsBtn.textContent = val ? "ON" : "OFF"; if(!val) trailLines.forEach(l=>l.visible=false); else updateTrailVisuals(); });
    gui.add(CONFIG, 'adaptiveDtEnabled').name('Adaptive Timestep');
    gui.add(CONFIG, 'timeScale', 0, CONFIG.maxTimeScale).name('Time Scale').onChange(val => { currentSpeed = val; speedSpan.innerText = val.toFixed(1)+'x'; });
    gui.add(CONFIG, 'useLogarithmicDepth').name('Log Depth Buffer').onChange(val => location.reload());
    gui.add(CONFIG, 'useDynamicOrigin').name('Dynamic Origin');
    console.log('Ultimate solar system with 40+ new bodies, real star catalog, nebulae, comets, dwarf planets, and 20k asteroids ready');
</script>
</body>
</html>
