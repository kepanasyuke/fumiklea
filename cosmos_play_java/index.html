<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Космос с 3D-моделями NASA</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0f0;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border-left: 3px solid #0f0;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #0f0;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            text-align: right;
            border-right: 3px solid #0f0;
        }
        #loading-status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffaa44;
            background: rgba(0,0,0,0.6);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
            border-top: 2px solid #ffaa44;
            max-width: 280px;
        }
        .loading-done {
            color: #0f0 !important;
            border-top-color: #0f0 !important;
        }
    </style>
</head>
<body>
    <div id="info">
        КОСМИЧЕСКИЙ АРТ-ОБЪЕКТ<br>
        3D-модели NASA | Реалистичная Солнечная система
    </div>
    <div id="controls">
        МЫШЬ — вращать камеру<br>
        КОЛЁСИКО — приблизить
    </div>
    <div id="loading-status">
        ⏳ ЗАГРУЗКА 3D-МОДЕЛЕЙ...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ---------- НАСТРОЙКИ СЦЕНЫ ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010108);
        scene.fog = new THREE.FogExp2(0x010108, 0.00015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 28);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        // Пост-обработка свечения
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.6);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // Управление камерой
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);
        controls.minDistance = 4;
        controls.maxDistance = 60;

        // ---------- ОСВЕЩЕНИЕ ----------
        // Солнечный свет
        const sunLight = new THREE.PointLight(0xffaa66, 2.2, 100);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);
        
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        const fillLight = new THREE.DirectionalLight(0x88aaff, 0.5);
        fillLight.position.set(5, 10, 7);
        scene.add(fillLight);

        // ---------- ЗВЁЗДНОЕ НЕБО ----------
        const starCount = 6000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const r = 180 + Math.random() * 80;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = r * Math.cos(phi);
            const colorTemp = Math.random();
            let rC, gC, bC;
            if (colorTemp < 0.6) { rC = 0.8; gC = 0.8; bC = 1.0; }
            else if (colorTemp < 0.8) { rC = 1.0; gC = 0.9; bC = 0.7; }
            else { rC = 1.0; gC = 0.6; bC = 0.5; }
            starColors[i*3] = rC;
            starColors[i*3+1] = gC;
            starColors[i*3+2] = bC;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // ---------- ДАННЫЕ ПЛАНЕТ (параметры орбит) ----------
        const planetsData = [
            { name: "Меркурий", distance: 4.8, speed: 0.022, angle: 0, filename: "Mercury_3D_Model.glb", scale: 0.9, color: 0xccaa88 },
            { name: "Венера",   distance: 6.2, speed: 0.016, angle: 0, filename: "Venus_3D_Model.glb", scale: 1.0, color: 0xeebb99 },
            { name: "Земля",    distance: 8.0, speed: 0.013, angle: 0, filename: "Earth_3D_Model.glb", scale: 1.0, color: 0x88aaff },
            { name: "Марс",     distance: 9.8, speed: 0.011, angle: 0, filename: "Mars_3D_Model.glb", scale: 0.95, color: 0xdd8866 },
            { name: "Юпитер",   distance: 13.8, speed: 0.007, angle: 0, filename: "Jupiter_3D_Model.glb", scale: 1.5, color: 0xccaa99 },
            { name: "Сатурн",   distance: 16.5, speed: 0.0055, angle: 0, filename: "Saturn_3D_Model.glb", scale: 1.4, color: 0xeeddbb },
            { name: "Уран",     distance: 19.2, speed: 0.004, angle: 0, filename: "Uranus_3D_Model.glb", scale: 1.3, color: 0xaaddff },
            { name: "Нептун",   distance: 22.5, speed: 0.0032, angle: 0, filename: "Neptune_3D_Model.glb", scale: 1.3, color: 0x88aaff }
        ];
        
        const planets = [];
        let loadedCount = 0;
        const totalPlanets = planetsData.length;
        const loadingDiv = document.getElementById('loading-status');
        
        // ---------- СОЛНЦЕ ----------
        const sunGeometry = new THREE.SphereGeometry(2.8, 128, 128);
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa66,
            emissive: 0xff4411,
            emissiveIntensity: 1.4,
            metalness: 0.95,
            roughness: 0.2
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);
        
        // Корона Солнца
        const coronaGeometry = new THREE.SphereGeometry(3.2, 64, 64);
        const coronaMaterial = new THREE.MeshPhongMaterial({
            color: 0xff8844,
            transparent: true,
            opacity: 0.12,
            side: THREE.BackSide
        });
        const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
        scene.add(corona);
        
        const sunGlowGeometry = new THREE.SphereGeometry(3.6, 32, 32);
        const sunGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffaa66,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
        scene.add(sunGlow);
        
        // ---------- ЗАГРУЗКА 3D-МОДЕЛЕЙ ПЛАНЕТ ----------
        const loader = new GLTFLoader();
        
        planetsData.forEach((data, idx) => {
            // Создаём пустой объект-контейнер для планеты (чтобы добавить его на сцену сразу)
            const container = new THREE.Object3D();
            container.userData = {
                name: data.name,
                distance: data.distance,
                speed: data.speed,
                angle: data.angle,
                description: "",
                mass: "",
                diameter: ""
            };
            scene.add(container);
            
            // Анимация орбиты будет обновлять position контейнера
            // А модель (когда загрузится) будет добавлена в контейнер
            planets.push(container);
            
            // Загрузка 3D-модели
            loader.load(`models/${data.filename}`, (gltf) => {
                const model = gltf.scene;
                model.scale.set(data.scale, data.scale, data.scale);
                model.position.set(0, 0, 0);
                container.add(model);
                
                loadedCount++;
                loadingDiv.innerHTML = `✅ ЗАГРУЖЕНО ${loadedCount} ИЗ ${totalPlanets} МОДЕЛЕЙ...`;
                if (loadedCount === totalPlanets) {
                    loadingDiv.innerHTML = `✅ ВСЕ МОДЕЛИ ЗАГРУЖЕНЫ!`;
                    loadingDiv.classList.add('loading-done');
                    setTimeout(() => {
                        loadingDiv.style.opacity = '0';
                        setTimeout(() => loadingDiv.style.display = 'none', 1000);
                    }, 3000);
                }
            }, undefined, (error) => {
                console.error(`Ошибка загрузки модели ${data.name}:`, error);
                loadingDiv.innerHTML = `⚠️ НЕ УДАЛОСЬ ЗАГРУЗИТЬ ${data.name} (проверьте папку models)`;
            });
        });
        
        // ---------- АСТЕРОИДНЫЙ ПОЯС ----------
        const asteroidCount = 4000;
        const asteroidGeom = new THREE.BufferGeometry();
        const asteroidPos = new Float32Array(asteroidCount * 3);
        for (let i = 0; i < asteroidCount; i++) {
            const r = 11.5 + Math.random() * 1.8;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.0;
            asteroidPos[i*3] = Math.cos(angle) * r;
            asteroidPos[i*3+1] = yOff;
            asteroidPos[i*3+2] = Math.sin(angle) * r;
        }
        asteroidGeom.setAttribute('position', new THREE.BufferAttribute(asteroidPos, 3));
        const asteroidMat = new THREE.PointsMaterial({ color: 0xaa9977, size: 0.045 });
        const asteroidBelt = new THREE.Points(asteroidGeom, asteroidMat);
        scene.add(asteroidBelt);
        
        // ---------- ТУМАННОСТИ ----------
        const nebulaCount = 1200;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPositions = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            nebulaPositions[i*3] = (Math.random() - 0.5) * 140;
            nebulaPositions[i*3+1] = (Math.random() - 0.5) * 70;
            nebulaPositions[i*3+2] = (Math.random() - 0.5) * 120 - 50;
            const choice = Math.random();
            let r, g, b;
            if (choice < 0.33) { r = 0.7; g = 0.3; b = 0.6; }
            else if (choice < 0.66) { r = 0.2; g = 0.4; b = 0.8; }
            else { r = 0.4; g = 0.2; b = 0.7; }
            nebulaColors[i*3] = r * 0.6;
            nebulaColors[i*3+1] = g * 0.5;
            nebulaColors[i*3+2] = b * 0.7;
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaMatObj = new THREE.PointsMaterial({ size: 0.14, vertexColors: true, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending });
        const nebulae = new THREE.Points(nebulaGeom, nebulaMatObj);
        scene.add(nebulae);
        
        // ---------- АНИМАЦИЯ ----------
        let time = 0;
        let pulseDir = 1;
        let pulseScale = 1;
        let frameCount = 0;
        let lastTime = performance.now();
        
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            frameCount++;
            if (now - lastTime >= 1000) {
                document.getElementById('fps-counter').innerHTML = `FPS: ${frameCount}`;
                frameCount = 0;
                lastTime = now;
            }
            
            time += 0.016;
            
            // Движение планет по орбитам
            planets.forEach(planet => {
                const d = planet.userData;
                d.angle += d.speed * 0.6;
                planet.position.x = Math.cos(d.angle) * d.distance;
                planet.position.z = Math.sin(d.angle) * d.distance;
                planet.rotation.y += 0.008;
            });
            
            // Пульсация Солнца
            pulseScale += 0.0035 * pulseDir;
            if (pulseScale > 1.07) pulseDir = -1;
            if (pulseScale < 0.96) pulseDir = 1;
            corona.scale.set(pulseScale + 0.05, pulseScale + 0.05, pulseScale + 0.05);
            sunGlow.scale.set(pulseScale + 0.12, pulseScale + 0.12, pulseScale + 0.12);
            
            // Вращение астероидного пояса
            asteroidBelt.rotation.y += 0.001;
            asteroidBelt.rotation.x = Math.sin(time * 0.03) * 0.01;
            nebulae.rotation.y += 0.0002;
            nebulae.rotation.x += 0.0001;
            stars.rotation.y += 0.0003;
            stars.rotation.x += 0.0002;
            
            controls.update();
            effectComposer.render();
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('3D-модели NASA успешно загружены');
    </script>
</body>
</html>
