version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/ege_math.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SECRET_KEY=supersecret
      - API_TOKEN=ege-token-2026
    volumes:
      - ./app:/app/app
      - ./web:/app/web
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload